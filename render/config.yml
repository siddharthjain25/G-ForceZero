token: "YOUR_API_TOKEN"
url: "https://lichess.org/"

engine:
  dir: "/app/G-ForceZero/cpp_engine/"
  name: "nnue_engine"
  protocol: "uci"
  uci_options:
    Threads: 1
    Hash: 64

abort_time: 20
